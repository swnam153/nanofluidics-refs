<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanofluidics Reference Manager — v0.0.6</title>
<style>
:root {
  --bg: #f4f6f9;
  --sidebar-bg: #1a2332;
  --sidebar-hover: #243044;
  --sidebar-active: #2563eb;
  --card-bg: #ffffff;
  --border: #e2e8f0;
  --accent: #2563eb;
  --accent2: #0ea5e9;
  --text: #1e293b;
  --muted: #64748b;
  --red: #ef4444;
  --green: #10b981;
  --orange: #f59e0b;
  --tag-bg: #eff6ff;
  --tag-text: #1d4ed8;
  --deposit-bg: #fefce8;
  --deposit-border: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 220px; min-width: 220px; background: var(--sidebar-bg); color: #cbd5e1;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid #2d3f5a; }
#sidebar-header h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-bottom: 4px; }
#sidebar-header p { font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.3; }
#section-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.sec-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 9px 16px; background: none; border: none;
  color: #94a3b8; cursor: pointer; font-size: 13px; text-align: left; transition: .15s;
}
.sec-btn:hover { background: var(--sidebar-hover); color: #e2e8f0; }
.sec-btn.active { background: var(--sidebar-active); color: #fff; font-weight: 600; }
.sec-badge { background: rgba(255,255,255,.15); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; min-width: 24px; text-align: center; }
.sec-btn.active .sec-badge { background: rgba(255,255,255,.3); }
#sidebar-footer { padding: 12px 16px; border-top: 1px solid #2d3f5a; }
#total-count { font-size: 12px; color: #64748b; }

/* MAIN */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
#topbar {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
#topbar h1 { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
#search-box {
  padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; width: 220px; outline: none;
}
#search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.btn {
  padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #059669; }
.btn-orange { background: var(--orange); color: #fff; }

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 20px; }

/* SECTION HEADER */
#section-header { margin-bottom: 16px; }
#section-header h2 { font-size: 20px; font-weight: 700; color: var(--text); }
#section-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
.stats-row { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.stat-chip { background: var(--tag-bg); color: var(--tag-text); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }

/* REF CARDS */
#ref-list { display: flex; flex-direction: column; gap: 8px; }
.ref-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; transition: .15s; position: relative;
}
.ref-card:hover { border-color: var(--accent2); box-shadow: 0 2px 8px rgba(37,99,235,.08); }
.ref-card.deposit { background: var(--deposit-bg); border-color: var(--deposit-border); }
.ref-top { display: flex; align-items: flex-start; gap: 10px; }
.ref-num {
  background: var(--accent); color: #fff; border-radius: 6px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.ref-num.deposit-num { background: var(--orange); }
.ref-body { flex: 1; min-width: 0; }
.ref-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
.ref-journal { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 4px; }
.ref-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.ref-tag { background: #f1f5f9; color: var(--muted); border-radius: 4px; padding: 2px 6px; font-size: 11px; }
.ref-tag.pmid { background: #f0fdf4; color: #166534; }
.ref-tag.doi { background: #fef3c7; color: #92400e; }
.ref-actions { display: flex; gap: 6px; margin-left: auto; }
.ref-action-btn {
  padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
  background: #fff; cursor: pointer; font-size: 11px; color: var(--muted); transition: .15s;
}
.ref-action-btn:hover { background: var(--bg); color: var(--text); }
.ref-action-btn.del:hover { background: #fef2f2; color: var(--red); border-color: var(--red); }

/* DEPOSIT QUEUE */
#deposit-section { margin-bottom: 20px; }
#deposit-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  padding: 8px 12px; background: var(--deposit-bg); border: 1px solid var(--deposit-border);
  border-radius: 6px; cursor: pointer;
}
#deposit-header h3 { font-size: 13px; font-weight: 700; color: #92400e; flex: 1; }
.deposit-arrow { font-size: 12px; color: #92400e; }

/* MODAL */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 1000; align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: #fff; border-radius: 12px; padding: 24px; width: 560px; max-width: 95vw;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
#modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; font-family: inherit; outline: none; transition: .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}
.form-group textarea { resize: vertical; min-height: 60px; }
#pdf-drop {
  border: 2px dashed var(--border); border-radius: 8px; padding: 20px;
  text-align: center; cursor: pointer; transition: .15s; margin-bottom: 14px;
  color: var(--muted); font-size: 13px;
}
#pdf-drop:hover, #pdf-drop.drag-over { border-color: var(--accent); background: var(--tag-bg); color: var(--accent); }
#pdf-drop input { display: none; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* EXPORT PANEL */
#export-panel {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 1000; align-items: center; justify-content: center;
}
#export-panel.open { display: flex; }
#export-box {
  background: #fff; border-radius: 12px; padding: 24px; width: 700px; max-width: 95vw;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
#export-text { width: 100%; font-family: monospace; font-size: 12px; height: 400px; border: 1px solid var(--border); border-radius: 6px; padding: 10px; resize: vertical; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

/* TOAST */
#toast {
  position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <h2>Biosensors Manuscript</h2>
    <p>Nanofluidics via Semiconductor Processes</p>
  </div>
  <div id="section-list">
    <button class="sec-btn active" onclick="switchSection('ALL')" id="btn-ALL">

    <button class="sec-btn" onclick="switchSection('S1')" id="btn-S1">

    <button class="sec-btn" onclick="switchSection('S8')" id="btn-S8">

    <button class="sec-btn" onclick="switchSection('S9')" id="btn-S9">

<!-- MAIN -->

  <div id="topbar">

    <button class="btn btn-green" onclick="openAddModal()">＋ Add Reference</button>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="section-header">
      <div class="stats-row" id="stats-row"></div>
    </div>

    <div id="deposit-section" style="display:none">
      <div id="deposit-header" onclick="toggleDeposit()">
        <h3>⏳ Deposit Queue — pending references</h3>
        <span class="deposit-arrow" id="deposit-arrow">▼</span>
      </div>
      <div id="deposit-list"></div>
    </div>

    <div id="ref-list"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <h3>➕ Add New Reference</h3>
    
    <div id="pdf-drop" onclick="document.getElementById('pdf-input').click()"
         ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <input type="file" id="pdf-input" accept=".pdf" onchange="handleFileSelect(event)">
      📄 Drop PDF here, or click to select<br>
      <small style="color:#94a3b8">(Metadata will be extracted from filename)</small>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Section *</label>
        <select id="form-section">
          <option value="1. Introduction">1. Introduction</option>
          <option value="2. EBL and ALD">2. EBL and ALD</option>
          <option value="3. Nanowire and Nanotube">3. Nanowire and Nanotube</option>
          <option value="4. Electrofluidics">4. Electrofluidics</option>
          <option value="5. DNA transistors">5. DNA transistors</option>
          <option value="6. Sacrificial nanochannels">6. Sacrificial nanochannels</option>
          <option value="7. Exosome">7. Exosome</option>
          <option value="8. Additive Technology">8. Additive Technology</option>
          <option value="9. Additional Review References">9. Additional Review References</option>
          <option value="그외 참고">그외 참고</option>
        </select>
      </div>
      <div class="form-group">
        <label>Keyword / Tag</label>
        <input type="text" id="form-keyword" placeholder="e.g., surface charge, EBL">
      </div>
    </div>

    <div class="form-group">
      <label>Paper Title *</label>
      <input type="text" id="form-title" placeholder="Full paper title">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Journal / Author / Year *</label>
        <input type="text" id="form-journal" placeholder="e.g., Nat Nano 2024 Author">
      </div>
      <div class="form-group">
        <label>PMID / DOI</label>
        <input type="text" id="form-pmid" placeholder="PMID: 12345678 or doi.org/...">
      </div>
    </div>

    <div class="form-group">
      <label>Note</label>
      <textarea id="form-note" placeholder="Optional notes, relevance to sections..."></textarea>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="form-status">
        <option value="deposit">⏳ Deposit Queue (assign ref# later)</option>
        <option value="confirmed">✅ Confirmed (assign ref# now)</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitRef()">Add to Deposit Queue</button>
    </div>
  </div>
</div>

<!-- EXPORT PANEL -->
<div id="export-panel" onclick="closeExport(event)">
  <div id="export-box">
    <h3 style="margin-bottom:12px">📋 Export References</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="exportFormat('numbered')">Numbered List</button>
      <button class="btn btn-secondary" onclick="exportFormat('section')">By Section</button>
      <button class="btn btn-secondary" onclick="exportFormat('manuscript')">Manuscript [ref. ?] Format</button>
      <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
      <button class="btn btn-secondary" style="margin-left:auto" onclick="closeExport()">Close</button>
    </div>
    <textarea id="export-text" readonly></textarea>
  </div>
</div>

<div id="toast">✓ Copied to clipboard</div>

// ============================================================
// STATE
// ============================================================
let currentSection = 'ALL';
let depositOpen = true;

// Load deposits from localStorage
function loadDeposits() {
  try { return JSON.parse(localStorage.getItem('nf_deposits') || '[]'); } catch(e) { return []; }
}
function saveDeposits(deps) {
  localStorage.setItem('nf_deposits', JSON.stringify(deps));
}
function getDeposits() { return loadDeposits(); }

// ============================================================
// SECTION SWITCH
// ============================================================
function switchSection(id) {
  currentSection = id;
  document.querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + id).classList.add('active');
  document.getElementById('search-box').value = '';
  renderList();
}

// ============================================================
// RENDER
// ============================================================
function getFilteredRefs() {
  const q = document.getElementById('search-box').value.toLowerCase();
  const deps = getDeposits();
  
  if (currentSection === 'DEPOSIT') {
    return deps.filter(r => !q || matchesQuery(r, q));
  }
  
  let refs = BUILTIN_REFS;
  if (currentSection !== 'ALL') {
    const secName = SECTIONS.find(s => s.id === currentSection)?.name;
    refs = refs.filter(r => r.section === secName);
  }
  if (q) refs = refs.filter(r => matchesQuery(r, q));
  return refs;
}

function matchesQuery(r, q) {
  return (r.title||'').toLowerCase().includes(q) ||
         (r.journal||'').toLowerCase().includes(q) ||
         (r.keyword||'').toLowerCase().includes(q) ||
         (r.pmid_doi||'').toLowerCase().includes(q) ||
         (r.note||'').toLowerCase().includes(q);
}

function renderList() {
  const deps = getDeposits();
  
  // Update badges
  SECTIONS.forEach(s => {
    const count = BUILTIN_REFS.filter(r => r.section === s.name).length;
    const el = document.getElementById('badge-' + s.id);
    if (el) el.textContent = count;
  });
  document.getElementById('badge-ALL').textContent = BUILTIN_REFS.length;
  document.getElementById('badge-DEPOSIT').textContent = deps.length;
  document.getElementById('total-count').innerHTML = 'Total: <strong>' + (BUILTIN_REFS.length + deps.length) + '</strong> references';
  
  const refs = getFilteredRefs();
  
  // Topbar title
  let title = 'All References';
  if (currentSection === 'DEPOSIT') title = 'Deposit Queue';
  else if (currentSection !== 'ALL') title = SECTIONS.find(s => s.id === currentSection)?.name || '';
  document.getElementById('topbar-title').textContent = title + ' (' + refs.length + ')';
  
  // Stats
  const statsRow = document.getElementById('stats-row');
  if (currentSection === 'ALL') {
    statsRow.innerHTML = SECTIONS.slice(0,9).map(s => {
      const c = BUILTIN_REFS.filter(r => r.section === s.name).length;
      return '<span class="stat-chip">' + s.short + ': ' + c + '</span>';
    }).join('') + '<span class="stat-chip" style="background:#fef3c7;color:#92400e">⏳ Deposits: ' + deps.length + '</span>';
  } else {
    statsRow.innerHTML = '';
  }
  
  // Deposit section
  const sectionDeposits = currentSection === 'ALL' ? deps :
    currentSection === 'DEPOSIT' ? deps :
    deps.filter(r => {
      const secName = SECTIONS.find(s => s.id === currentSection)?.name;
      return r.section === secName;
    });
  
  const depositSection = document.getElementById('deposit-section');
  if (sectionDeposits.length > 0 && currentSection !== 'DEPOSIT') {
    depositSection.style.display = 'block';
    document.getElementById('deposit-list').innerHTML = depositOpen ? sectionDeposits.map((r,i) => renderDepositCard(r, i)).join('') : '';
    document.getElementById('deposit-arrow').textContent = depositOpen ? '▲' : '▼';
  } else {
    depositSection.style.display = 'none';
  }
  
  // Main ref list
  const listEl = document.getElementById('ref-list');
  if (currentSection === 'DEPOSIT') {
    listEl.innerHTML = deps.length === 0 ?
      '<div class="empty-state"><div class="icon">📥</div><p>No references in deposit queue yet.<br>Use <strong>+ Add Reference</strong> to deposit papers.</p></div>' :
      deps.map((r,i) => renderDepositCard(r, i)).join('');
  } else {
    listEl.innerHTML = refs.length === 0 ?
      '<div class="empty-state"><div class="icon">🔍</div><p>No references found.</p></div>' :
      refs.map(r => renderRefCard(r)).join('');
  }
}

function renderRefCard(r) {
  const pmidTag = r.pmid_doi ? '<span class="ref-tag ' + (r.pmid_doi.includes('doi') ? 'doi' : 'pmid') + '">' + r.pmid_doi.substring(0,40) + '</span>' : '';
  const kwTag = r.keyword ? '<span class="ref-tag">' + r.keyword.substring(0,30) + '</span>' : '';
  const noteTag = r.note ? '<span class="ref-tag" title="' + r.note + '">📝</span>' : '';
  return '<div class="ref-card">' +
    '<div class="ref-top">' +
    '<div class="ref-num">' + r.ref_num + '</div>' +
    '<div class="ref-body">' +
    '<div class="ref-title">' + escHtml(r.title || '(no title)') + '</div>' +
    '<div class="ref-journal">' + escHtml(r.journal || '') + '</div>' +
    '<div class="ref-meta">' + pmidTag + kwTag + noteTag + '</div>' +
    '</div>' +
    '<div class="ref-actions">' +
    (r.pmid_doi && r.pmid_doi.includes('doi') ? '<button class="ref-action-btn" onclick="openDoi(\'' + escHtml(r.pmid_doi) + '\')">🔗 DOI</button>' : '') +
    '<button class="ref-action-btn" onclick="copyRef(' + r.ref_num + ')">Copy</button>' +
    '</div></div></div>';
}

function renderDepositCard(r, idx) {
  return '<div class="ref-card deposit" style="margin-bottom:8px">' +
    '<div class="ref-top">' +
    '<div class="ref-num deposit-num">D' + (idx+1) + '</div>' +
    '<div class="ref-body">' +
    '<div class="ref-title">' + escHtml(r.title || '(no title)') + '</div>' +
    '<div class="ref-journal">' + escHtml(r.journal || '') + '</div>' +
    '<div class="ref-meta">' +
    '<span class="ref-tag">' + escHtml(r.section || '') + '</span>' +
    (r.keyword ? '<span class="ref-tag">' + escHtml(r.keyword) + '</span>' : '') +
    (r.pmid_doi ? '<span class="ref-tag pmid">' + escHtml(r.pmid_doi.substring(0,40)) + '</span>' : '') +
    '<span class="ref-tag" style="background:#fef3c7;color:#92400e">⏳ Deposit</span>' +
    '</div>' +
    (r.note ? '<div style="font-size:11px;color:#92400e;margin-top:4px">📝 ' + escHtml(r.note) + '</div>' : '') +
    '</div>' +
    '<div class="ref-actions">' +
    '<button class="ref-action-btn" onclick="assignRef(' + idx + ')">Assign #</button>' +
    '<button class="ref-action-btn del" onclick="deleteDeposit(' + idx + ')">✕ Remove</button>' +
    '</div></div></div>';
}

function toggleDeposit() {
  depositOpen = !depositOpen;
  renderList();
}

// ============================================================
// ADD MODAL
// ============================================================
let editingDepositIdx = -1;

function openAddModal(sectionId) {
  editingDepositIdx = -1;
  if (sectionId) {
    const sec = SECTIONS.find(s => s.id === sectionId);
    if (sec) document.getElementById('form-section').value = sec.name;
  } else if (currentSection !== 'ALL' && currentSection !== 'DEPOSIT') {
    const sec = SECTIONS.find(s => s.id === currentSection);
    if (sec) document.getElementById('form-section').value = sec.name;
  }
  document.getElementById('form-title').value = '';
  document.getElementById('form-journal').value = '';
  document.getElementById('form-pmid').value = '';
  document.getElementById('form-keyword').value = '';
  document.getElementById('form-note').value = '';
  document.getElementById('form-status').value = 'deposit';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function submitRef() {
  const title = document.getElementById('form-title').value.trim();
  const journal = document.getElementById('form-journal').value.trim();
  if (!title || !journal) { alert('Title and Journal/Author/Year are required.'); return; }
  
  const newRef = {
    title, journal,
    section: document.getElementById('form-section').value,
    keyword: document.getElementById('form-keyword').value.trim(),
    pmid_doi: document.getElementById('form-pmid').value.trim(),
    note: document.getElementById('form-note').value.trim(),
    added_at: new Date().toISOString(),
  };
  
  const deps = getDeposits();
  deps.push(newRef);
  saveDeposits(deps);
  closeModal();
  renderList();
  showToast('Reference added to deposit queue ✓');
}

// ============================================================
// PDF HANDLING
// ============================================================
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('pdf-drop').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') extractPdfMeta(file);
}
function handleDragOver(e) { e.preventDefault(); document.getElementById('pdf-drop').classList.add('drag-over'); }
function handleDragLeave(e) { document.getElementById('pdf-drop').classList.remove('drag-over'); }
function handleFileSelect(e) { const file = e.target.files[0]; if (file) extractPdfMeta(file); }

function extractPdfMeta(file) {
  // Extract metadata from filename
  const name = file.name.replace('.pdf','').replace(/_/g,' ');
  document.getElementById('form-title').value = name;
  document.getElementById('pdf-drop').innerHTML = '✅ ' + file.name + '<br><small style="color:#94a3b8">Fill in journal/author/year below</small>';
  document.getElementById('form-journal').focus();
}

// ============================================================
// DEPOSIT ACTIONS
// ============================================================
function deleteDeposit(idx) {
  if (!confirm('Remove this deposit?')) return;
  const deps = getDeposits();
  deps.splice(idx, 1);
  saveDeposits(deps);
  renderList();
  showToast('Deposit removed');
}

function assignRef(idx) {
  const deps = getDeposits();
  const r = deps[idx];
  const nextNum = prompt('Assign reference number (next available: ' + (BUILTIN_REFS.length + 1) + '):', BUILTIN_REFS.length + 1);
  if (nextNum && !isNaN(nextNum)) {
    showToast('Ref [' + nextNum + '] assigned — update Excel & re-run manuscript script');
    deps[idx].assigned_num = parseInt(nextNum);
    saveDeposits(deps);
    renderList();
  }
}

// ============================================================
// EXPORT
// ============================================================
let currentExportText = '';

function openExport() {
  document.getElementById('export-panel').classList.add('open');
  exportFormat('numbered');
}
function closeExport(e) {
  if (!e || e.target === document.getElementById('export-panel'))
    document.getElementById('export-panel').classList.remove('open');
}

function exportFormat(fmt) {
  const refs = currentSection === 'ALL' ? BUILTIN_REFS :
    BUILTIN_REFS.filter(r => r.section === SECTIONS.find(s => s.id === currentSection)?.name);
  const deps = getDeposits();
  let out = '';
  
  if (fmt === 'numbered') {
    out = refs.map(r => '[' + r.ref_num + '] ' + (r.title || '') + '. ' + (r.journal || '') + (r.pmid_doi ? ' | ' + r.pmid_doi : '')).join('\n');
    if (deps.length > 0) {
      out += '\n\n--- DEPOSIT QUEUE ---\n';
      out += deps.map((r,i) => '[D' + (i+1) + '] ' + (r.title||'') + '. ' + (r.journal||'') + '  (Section: ' + r.section + ')').join('\n');
    }
  } else if (fmt === 'section') {
    SECTIONS.forEach(s => {
      const sr = BUILTIN_REFS.filter(r => r.section === s.name);
      if (sr.length === 0) return;
      out += '\n=== ' + s.name + ' (' + sr.length + ' refs) ===\n';
      out += sr.map(r => '[' + r.ref_num + '] ' + (r.journal||'') + ' — ' + (r.title||'').substring(0,80)).join('\n');
      out += '\n';
    });
    if (deps.length > 0) {
      out += '\n=== DEPOSIT QUEUE (' + deps.length + ') ===\n';
      out += deps.map((r,i) => '[D' + (i+1) + '] ' + r.section + ' | ' + (r.journal||'') + ' — ' + (r.title||'')).join('\n');
    }
  } else if (fmt === 'manuscript') {
    out = '--- For manuscript [ref. ?] filling ---\n\n';
    SECTIONS.forEach(s => {
      const sr = BUILTIN_REFS.filter(r => r.section === s.name);
      if (sr.length === 0) return;
      out += s.name + ':\n';
      out += sr.map(r => '[ref. ' + (r.journal||'') + ']  →  Ref #' + r.ref_num).join('\n');
      out += '\n\n';
    });
  }
  
  currentExportText = out.trim();
  document.getElementById('export-text').value = currentExportText;
}

function copyExport() {
  navigator.clipboard.writeText(currentExportText).then(() => showToast('Copied to clipboard ✓'));
}

// ============================================================
// UTILITIES
// ============================================================
function copyRef(refNum) {
  const r = BUILTIN_REFS.find(x => x.ref_num === refNum);
  if (r) {
    const txt = '[' + r.ref_num + '] ' + (r.journal||'') + ' — ' + (r.title||'');
    navigator.clipboard.writeText(txt).then(() => showToast('Ref [' + refNum + '] copied ✓'));
  }
}

function openDoi(doi) {
  const url = doi.startsWith('http') ? doi : 'https://' + doi;
  window.open(url, '_blank');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
renderList();
</script>
